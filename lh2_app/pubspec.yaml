name: lh2_app
description: LH2 Lighthouse Hyperpanel - Flutter Web App
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Local LH2 stub package
  lh2_stub:
    path: ../lh2_stub

  # Routing
  go_router: ^14.6.3
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  web: ^1.1.1
  test: ^1.26.3
  
  # Canvas and node visualization
  vs_node_view: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false